<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cat and Mouse</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="game">
    <h1>Cats &amp; Mice</h1>

    <div id="top">
      <div id="status">Place <strong>Cat</strong> on a node to begin</div>
      <div id="difficulty">
        Robber AI:
        <select id="diffSel">
          <option value="greedy">Greedy</option>
          <option value="lookahead" selected>Lookahead</option>
          <option value="astar">A* escape</option>
        </select>
      </div>
    </div>

    <div id="legend">
      <div class="leg">
        <div class="dot cop-dot"></div>Cat
      </div>
      <div class="leg">
        <div class="dot rob-dot"></div>Mouse
      </div>
      <div class="leg">
        <div class="dot move-dot"></div>Valid move
      </div>
    </div>

    <div id="log">Click a node to place the Cat.</div>

    <canvas id="c"></canvas>

    <div id="btns">
      <button class="primary" id="resetBtn">New game</button>
      <button id="hintBtn" disabled>Hint (Cat)</button>
      <button id="aiBtn" disabled>AI Mouse move</button>
      <button id="autoBtn">Auto-play Mouse</button>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>

</html>
